spring.application.name=beanBoiBackend
server.port = 8090

# MongoDB Connection Configuration
spring.data.mongodb.uri=mongodb://localhost:27017
spring.data.mongodb.database=beanBoi
spring.data.mongodb.auto-index-creation=true

# MongoDB host and port settings (optional, used if URI not sufficient)
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017

# Environment variable override support for MongoDB connection
# These can be overridden via .env file or command line args:
# spring.data.mongodb.uri=${MONGODB_URI}
# spring.data.mongodb.database=${MONGO_INITDB_DATABASE}

# Application logging configuration
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.beanBoi.beanBoiBackend=INFO

# Spring Boot MongoDB connection timeout settings
spring.data.mongodb.connection-timeout=5000
spring.data.mongodb.socket-timeout=300000
spring.data.mongodb.max-pool-size=10