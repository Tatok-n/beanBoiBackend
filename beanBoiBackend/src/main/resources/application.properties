spring.application.name=beanBoiBackend
server.port=8090

spring.data.mongodb.uri=mongodb://mongodb:27017/beanBoi
spring.data.mongodb.auto-index-creation=true

spring.data.mongodb.max-pool-size=10
spring.data.mongodb.connection-timeout=5000
spring.data.mongodb.server-selection-timeout=5000
spring.data.mongodb.socket-timeout=30000

logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.beanBoi.beanBoiBackend=INFO